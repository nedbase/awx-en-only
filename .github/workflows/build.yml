name: Build and Publish AWX (en-US only)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      awx_tag:
        description: 'AWX upstream tag to build (e.g. 24.6.1)'
        required: true
        default: '24.6.1'

env:
  REGISTRY: ghcr.io
  # Set this to your GitHub username / org
  IMAGE_NAME: ${{ github.repository_owner }}/awx

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout this repo (fork config/patches)
        uses: actions/checkout@v7

      # ── Resolve which upstream AWX tag to build ───────────────────────
      - name: Determine AWX upstream tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "awx_tag=${{ github.event.inputs.awx_tag }}" >> "$GITHUB_OUTPUT"
          else
            # Fall back to the value pinned in awx-version.txt in this repo
            echo "awx_tag=$(cat awx-version.txt | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          fi

      # ── Check out the upstream AWX source at the pinned tag ───────────
      - name: Check out upstream AWX
        uses: actions/checkout@v7
        with:
          repository: ansible/awx
          ref: ${{ steps.tag.outputs.awx_tag }}
          path: awx-src
          # Full history needed so setuptools-scm can derive the version string
          fetch-depth: 0

      # ── Strip non-English locales ─────────────────────────────────────
      #
      # Two locations hold locale data, and they use DIFFERENT naming:
      #
      #   1. awx/locale/<lang>/LC_MESSAGES/django.po   (Django back-end strings)
      #      Region-coded dirs; English is "en-us". Compiled to .mo by
      #      tools/scripts/compilemessages.py during the UI build.
      #
      #   2. awx/ui/src/locales/<lang>/messages.po     (LinguiJS front-end strings)
      #      Short-code dirs (en, es, fr, ja, ko, nl, zh) plus a "zu" pseudo-
      #      locale. English is "en" — there is NO "en-us" here. Compiled to JS
      #      by `lingui compile` (npm run compile-strings) before webpack build.
      #
      # NOTE: deleting the catalogs is necessary but NOT sufficient to force
      # English — see the "Force English in UI locale loader" step below.
      #
      - name: Strip non-English locales
        working-directory: awx-src
        run: |
          set -euo pipefail

          echo "=== Django backend locales (awx/locale/) — keeping en-us ==="
          ls awx/locale/
          for dir in awx/locale/*/; do
            lang=$(basename "$dir")
            if [ "$lang" != "en-us" ]; then
              echo "  removing backend $dir"
              rm -rf "$dir"
            fi
          done
          echo "=== Remaining backend locales ==="
          ls awx/locale/

          echo "=== UI front-end locales (awx/ui/src/locales/) — keeping en ==="
          ls awx/ui/src/locales/
          for dir in awx/ui/src/locales/*/; do
            lang=$(basename "$dir")
            if [ "$lang" != "en" ]; then
              echo "  removing frontend $dir"
              rm -rf "$dir"
            fi
          done
          echo "=== Remaining frontend locales ==="
          ls awx/ui/src/locales/

      # ── Force English in the UI locale loader ─────────────────────────
      #
      # awx/ui/src/App.js only falls back to English when the browser's
      # language is NOT a key in the `locales` map exported by i18nLoader.js.
      # That map lists all shipped languages, so e.g. a Dutch browser keeps
      # "nl" and then dynamicActivate('nl') does
      #   import('./locales/nl/messages')
      # against the catalog we just deleted — breaking the UI at runtime.
      #
      # Reducing the map to just `en` makes every non-English browser fall
      # back to English and load the one catalog that still exists. We also
      # trim .linguirc so `lingui compile` only processes `en`.
      #
      - name: Force English in UI locale loader
        working-directory: awx-src
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import re, json, pathlib

          loader = pathlib.Path("awx/ui/src/i18nLoader.js")
          src = loader.read_text()
          src, n = re.subn(
              r"export const locales = \{.*?\};",
              "export const locales = {\n  en: 'English',\n};",
              src, count=1, flags=re.S,
          )
          assert n == 1, "could not find `export const locales` block in i18nLoader.js"
          loader.write_text(src)
          print("Rewrote i18nLoader.js locales map to en-only.")

          rc = pathlib.Path("awx/ui/.linguirc")
          cfg = json.loads(rc.read_text())
          cfg["locales"] = ["en"]
          cfg.pop("pseudoLocale", None)  # pseudoLocale 'zu' no longer present
          rc.write_text(json.dumps(cfg, indent=2))
          print("Updated .linguirc to compile en only.")
          EOF

      # ── Pin floating @devel git requirements ──────────────────────────
      #
      # requirements/requirements_git.txt tracks the moving `devel` branch of
      # four sibling repos. Building an old AWX tag today pulls *today's* devel,
      # which no longer matches 24.6.1's pinned deps. Concretely,
      # django-ansible-base@devel now resolves to a build that requires
      # Django>=4.2.26 (and drops the rest_filters/jwt_consumer/resource_registry
      # extras), conflicting with AWX 24.6.1's pinned django==4.2.10 and making
      # `make requirements_awx` fail with ResolutionImpossible.
      #
      # Pin each ref to the commit that was on `devel` when AWX 24.6.1 was tagged
      # (2024-07-02) so the dependency set matches the release. dab @ 12139716
      # requires Django>=4.2.5,<4.3.0, which django==4.2.10 satisfies. Verified
      # that the full `pip install` resolves and builds with these pins.
      - name: Pin floating @devel git requirements
        working-directory: awx-src
        run: |
          set -euo pipefail
          f=requirements/requirements_git.txt
          echo "=== before ==="; cat "$f"
          sed -i \
            -e 's#system-certifi.git@devel#system-certifi.git@5aa52ab91f9d579bfe52b5acf30ca799f1a563d9#' \
            -e 's#ansible-runner.git@devel#ansible-runner.git@c3e8cdb24f784a70328f1bfb54eb9c886148acef#' \
            -e 's#python3-saml.git@devel#python3-saml.git@f90824c4910e36c5a89dd295271be26691204ba3#' \
            -e 's#django-ansible-base@devel#django-ansible-base@12139716db383b5eaf0022389c11c5c86fd5818c#' \
            "$f"
          echo "=== after ==="; cat "$f"
          if grep -q '@devel' "$f"; then
            echo "ERROR: a @devel ref was not pinned; upstream format may have changed" >&2
            exit 1
          fi

      # ── Pin the sdist build backend ───────────────────────────────────
      #
      # `make sdist` runs `python -m build -s`, which builds in an ISOLATED
      # environment created from pyproject.toml's [build-system] requires
      # (`setuptools>=45`, unpinned). pip installs today's setuptools (>=81),
      # which removed `pkg_resources`. awx/__init__.py does `import pkg_resources`
      # to compute the version, so the sdist build fails with:
      #     ModuleNotFoundError: No module named 'pkg_resources'
      #     NameError: name 'pkg_resources' is not defined
      #     ERROR Backend subprocess exited when trying to invoke build_sdist
      #
      # Pin the build backend to the versions AWX 24.6.1 bootstraps its venv
      # with (setuptools 69.0.2 / setuptools_scm 8.0.4), which still ship
      # pkg_resources. Verified `python -m build -s` then produces the tarball.
      - name: Pin sdist build backend (setuptools)
        working-directory: awx-src
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import pathlib
          p = pathlib.Path("pyproject.toml")
          s = p.read_text()
          old = 'requires = ["setuptools>=45", "setuptools_scm[toml]>=6.2"]'
          new = 'requires = ["setuptools==69.0.2", "setuptools_scm[toml]==8.0.4"]'
          assert old in s, "[build-system] requires line not found; upstream format may have changed"
          p.write_text(s.replace(old, new, 1))
          print("Pinned [build-system] requires:", new)
          EOF

      # ── Apply any extra patches from this fork ────────────────────────
      # Drop .patch files into patches/ in this repo to have them applied.
      - name: Apply local patches (if any)
        working-directory: awx-src
        run: |
          shopt -s nullglob
          for patch in "$GITHUB_WORKSPACE/patches"/*.patch; do
            echo "Applying $patch"
            git apply "$patch"
          done

      # ── Docker meta (tags + labels) ───────────────────────────────────
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For workflow_dispatch builds tag with the AWX version
            type=raw,value=${{ steps.tag.outputs.awx_tag }},enable=true
            # For git tags (vX.Y.Z) also produce a 'latest'
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      # ── Set up QEMU + buildx for multi-platform ───────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ── Log in to GHCR ────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Generate the Dockerfile + supervisor configs from templates ──
      #
      # AWX's Makefile delegates this to an Ansible playbook
      # (tools/ansible/dockerfile.yml -> roles/dockerfile). That role renders
      # FOUR files from templates/, not just the Dockerfile:
      #
      #   templates/supervisor_web.conf.j2     -> files/supervisor_web.conf
      #   templates/supervisor_task.conf.j2    -> files/supervisor_task.conf
      #   templates/supervisor_rsyslog.conf.j2 -> files/supervisor_rsyslog.conf
      #   templates/Dockerfile.j2              -> ./Dockerfile
      #
      # The Dockerfile ADDs the three supervisor configs from `template_dest`
      # (tools/ansible/roles/dockerfile/files/), so they must exist in the
      # build context. We reproduce all four renders here with Python + Jinja2
      # instead of pulling in the full Ansible stack.
      #
      - name: Install Jinja2 (for Dockerfile generation)
        run: pip install jinja2

      - name: Render Dockerfile and supervisor configs from templates
        working-directory: awx-src
        run: |
          python3 - <<'EOF'
          import pathlib
          from jinja2 import Environment, FileSystemLoader

          # AWX's templates are *Ansible* templates: they use Ansible's `|bool`
          # filter (e.g. `{% if not headless|bool %}` / `{% if kube_dev|bool %}`),
          # which plain Jinja2 does not provide. Register an equivalent so
          # rendering works without pulling in the whole Ansible stack.
          def ansible_bool(value):
              if isinstance(value, bool):
                  return value
              if isinstance(value, (int, float)):
                  return value != 0
              if value is None:
                  return False
              return str(value).strip().lower() in ("y", "yes", "on", "1", "true", "t")

          template_dir = "tools/ansible/roles/dockerfile/templates"
          # Where the Dockerfile expects the rendered supervisor configs to live.
          template_dest = "tools/ansible/roles/dockerfile/files"

          env = Environment(loader=FileSystemLoader(template_dir))
          env.filters["bool"] = ansible_bool

          # Variables that tools/ansible/dockerfile.yml passes to the templates.
          context = dict(
              headless=False,
              build_dev=False,
              kube_dev=False,
              image_architecture="x86_64",
              receptor_image="quay.io/ansible/receptor:devel",
              template_dest=template_dest,
          )

          # 1) Supervisor configs -> template_dest (must exist before the Dockerfile
          #    ADDs them). Mirrors the "Render supervisor configs" task in the role.
          dest_dir = pathlib.Path(template_dest)
          dest_dir.mkdir(parents=True, exist_ok=True)
          for name in ("supervisor_web.conf", "supervisor_task.conf", "supervisor_rsyslog.conf"):
              out = env.get_template(f"{name}.j2").render(**context)
              (dest_dir / name).write_text(out)
              print(f"Rendered {dest_dir / name}")

          # 2) The Dockerfile itself.
          dockerfile = env.get_template("Dockerfile.j2").render(**context)

          # AWX 24.6.1 hard-pins `openssl-3.0.7` (see JIRA AAP-23449). The base
          # image quay.io/centos/centos:stream9 is a rolling release and that
          # exact build has since been purged from the repos, so the builder's
          # `dnf install` now fails with:
          #     No match for argument: openssl-3.0.7
          #     Error: Unable to find a match: openssl-3.0.7
          # CentOS Stream 9 only offers openssl 3.5.x today, so drop the
          # micro-version pin and take the current openssl. Appears in both the
          # builder and final stages.
          patched = dockerfile.replace("openssl-3.0.7", "openssl")
          assert patched != dockerfile, "expected to find pinned 'openssl-3.0.7' to unpin"

          # AWX 24.6.1 pins Node 16.13.1 (`npm install -g n && n 16.13.1`) and
          # builds ui_next from `ansible-ui@main` (cloned fresh at build time).
          # Today's ansible-ui main pulls a dependency tree (sharp via
          # favicons-webpack-plugin, etc.) that requires Node >=18.17, so the
          # `make sdist` ui_next webpack build fails on Node 16 with:
          #     Error: Could not load the "sharp" module using the linux-x64 runtime
          #     - Please upgrade Node.js: Found 16.13.1 Requires ^18.17.0 || ...
          # and emits many `npm WARN EBADENGINE` warnings. Bump the pinned Node
          # to 20 (current LTS, satisfies the requirement) to build ui_next and
          # clear the engine warnings.
          before = patched
          patched = patched.replace("n 16.13.1", "n 20")
          assert patched != before, "expected to find pinned Node 'n 16.13.1' to bump"
          pathlib.Path("Dockerfile").write_text(patched)
          print("Dockerfile written successfully (openssl unpinned, Node bumped to 20).")
          EOF

      # ── Build and push ────────────────────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: awx-src
          file: awx-src/Dockerfile
          # Build amd64 only by default; add linux/arm64 if you need it
          # (arm64 builds take ~2× longer on GitHub-hosted runners via QEMU)
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.tag.outputs.awx_tag }}
            SETUPTOOLS_SCM_PRETEND_VERSION=${{ steps.tag.outputs.awx_tag }}
          # Cache layers between runs to keep build times reasonable
          cache-from: type=gha
          cache-to: type=gha,mode=max
